name: Refresh recent Bangumi data

on:
  workflow_dispatch:
  schedule:
    - cron: '20 0,12 * * *'

concurrency:
  group: bangumi-data-refresh
  cancel-in-progress: false

jobs:
  build-recent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regression tests
        run: |
          python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Refresh recent_data.json only
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python scripts/build_data.py \
            --output-dir . \
            --current-year $(date +%Y) \
            --skip-current-year \
            --recent-pages 0 \
            --year-pages 1
          python scripts/export_split_data.py

      - name: Commit generated data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add recent_data.json data/
          git diff --cached --quiet && exit 0
          git commit -m "chore: refresh recent bangumi data"
          git push
